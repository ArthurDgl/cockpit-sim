<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="/node_modules/canvas-gauges/gauge.min.js"></script>
    
    <link rel="stylesheet" type="text/css" href="/css/flight-indicators.css" />
    <script src="/js/flight-indicators.js"></script>

    <!-- <link rel="stylesheet" type="text/css" href="/custom/style.css" /> -->
    <link rel="stylesheet" href="css/style.css">
    <script src="/custom/Gauges.js"></script>

    <script src="/socket.io/socket.io.js"></script>

    <meta charset="UTF-8">
    <title>Immersive Cockpit Simulator</title>
</head>

<body>
    <div class="container1">
        <div class="box1">
            <canvas id="gauge-airSpeed" width="200" height="200"></canvas>
        </div>

        <div class="box2">
            <div id="instrument-attitude"></div>
        </div>

        <div class="box3">
            <div id="instrument-turn_coordinator"></div>
        </div>

        <div class="box4">
            <div id="instrument-heading"></div>
        </div>

        <div class="box5">
            <div id="instrument-altitude"></div>
        </div>

        <div class="box6">
            <div id="instrument-vertical"></div>
        </div>

    </div>
        
    <div class="container2">
        <div class="box7">
            <canvas id="gauge-fuel" width="160" height="160"></canvas>
        </div>
        
        <div class="box8">
            <canvas id="gauge-oil" width="160" height="160"></canvas>
        </div>
        
    </div>

    <div class="container3">    
        <div class="box9">
            <canvas id="compass-2" width="200" height="200"></canvas>
        </div>

        <div class="box10">
            <canvas id="cdi-1" width="200" height="200"></canvas>
        </div>

        <div class="box11">
            <canvas id="gauge-engineSpeed"></canvas>
        </div>

        <div class="box12">
            <canvas id="cdi-2" width="200" height="200"></canvas>
        </div>

        <div class="box13">
            <canvas id="analog-clock" width="200" height="200"></canvas>
        </div>

        <div class="box14">
            <canvas id="compass-1" width="200" height="200"></canvas>
        </div>
        
    </div>
    <div class="container4">
            <div class="box15">
                <canvas id="thermometer" width="160" height = "160"></canvas>
            </div>
            
            <div class="box16">
                <canvas id="suction-gauge" width="160" height = "160"></canvas>
            </div>
            
            <div class="box17">
                <canvas id="ammeter" width="160" height = "160"></canvas>
            </div>
    </div>




    

        


    
    
    <div class="control-panel">
        <div class="slider-group">
            <label><span>Throttle</span> <span id="value-throttle">0%</span></label>
            <input type="range" id="slider-throttle" min="0" max="100" value="0" step="1" 
                   oninput="sendPilotAction('THROTTLE', this.value)">
        </div>

        <div class="slider-group">
            <label><span>Elevator Trim</span> <span id="value-trim">0</span></label>
            <input type="range" id="slider-trim" min="-10" max="10" value="0" step="1" 
                   oninput="sendPilotAction('TRIM', this.value)">
        </div>

        <div class="slider-group">
            <label><span>Flaps</span> <span id="value-flaps">0</span></label>
            <input type="range" id="slider-flaps" min="0" max="3" value="0" step="1" 
                   oninput="sendPilotAction('FLAPS', this.value)">
        </div>

        <div class="slider-group">
            <label><span>Omni Bearing Selector 1</span> <span id="value-obs-1">0°</span></label>
            <input type="range" id="slider-flaps" min="0" max="360" value="0" step="1" 
                   oninput="sendPilotAction('OBS1', this.value)">
        </div>
    </div>

    
    

    

    <script src="/custom/main.js"></script>
</body>
</html>

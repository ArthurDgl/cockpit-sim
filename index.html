<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="//cdn.rawgit.com/Mikhus/canvas-gauges/gh-pages/download/2.1.7/radial/gauge.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/css/flight-indicators.css" />
    <script src="/js/flight-indicators.js"></script>

    <meta charset="UTF-8">
    <title>Cockpit MSFS - Évolué</title>
    <style>
        body { background-color: #1a1a1a; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; }
        .instruments { display: flex; gap: 20px; margin-bottom: 30px; }
        .ecran { border: 2px solid #333; background: #000; padding: 15px; border-radius: 8px; text-align: center; width: 120px; }
        .valeur { font-size: 2em; font-weight: bold; display: block; margin-top: 10px; }
        
        /* Style pour la zone des sliders */
        .panneau-controle { background: #222; padding: 20px; border-radius: 10px; border: 2px solid #444; width: 400px; }
        .slider-groupe { margin-bottom: 20px; }
        .slider-groupe label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 1.2em; }
        input[type="range"] { width: 100%; cursor: pointer; }

        /* NOUVEAU : Style pour les voyants du train d'atterrissage */
        .panneau-train { background: #111; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 25px; width: 80%; border: 1px solid #333; }
        .voyant { width: 25px; height: 25px; border-radius: 50%; background-color: #222; border: 2px solid #000; display: inline-block; margin: 0 8px; box-shadow: inset 0 0 5px rgba(0,0,0,0.8); transition: background-color 0.2s; }
        .voyant.vert { background-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        .voyant.rouge { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; }

    </style>
</head>

<body>

    <h1>TABLEAU DE BORD</h1>

    <div class="instruments">
        <div class="ecran"><span>ALT (ft)</span><span class="valeur" id="altitude">---</span></div>
        <div class="ecran"><span>CAP (°)</span><span class="valeur" id="cap">---</span></div>
        <div class="ecran"><span>INC ROULIS (°)</span><span class="valeur" id="roulis">---</span></div>
        <div class="ecran"><span>INC TANGAGE (°)</span><span class="valeur" id="tangage">---</span></div>
        <div class="ecran"><span>VIT VERT (fpm)</span><span class="valeur" id="vitesse_verticale">---</span></div>

        <div class="ecran-gauge">
            <canvas id="gauge-vitesse"></canvas>
        </div>
        <div class="ecran-gauge">
            <canvas id="gauge-regime"></canvas>
        </div>
        <div class="ecran-gauge">
            <canvas id="gauge-carburant"></canvas>
        </div>

    </div>
    
    <div class="panneau-controle">
        <div class="panneau-train">
            <div style="margin-bottom: 10px; font-weight: bold; color: #fff;">GEAR</div>
            <div id="roue-gauche" class="voyant"></div>
            <div id="roue-nez" class="voyant" style="transform: translateY(-10px);"></div>
            <div id="roue-droite" class="voyant"></div>
        </div>

        <!-- Slider des Gaz -->
        <div class="slider-groupe">
            <label><span>Gaz (Throttle)</span> <span id="valeur-throttle">0%</span></label>
            <input type="range" id="slider-throttle" min="0" max="100" value="0" step="1" 
                   oninput="envoyerSlider('THROTTLE', this.value)">
        </div>

        <!-- Slider du Trim (souvent de -10 à +10) -->
        <div class="slider-groupe">
            <label><span>Trim (Profondeur)</span> <span id="valeur-trim">0</span></label>
            <input type="range" id="slider-trim" min="-10" max="10" value="0" step="1" 
                   oninput="envoyerSlider('TRIM', this.value)">
        </div>

        <!-- Slider des Volets (souvent par crans : 0, 1, 2, 3) -->
        <div class="slider-groupe">
            <label><span>Volets (Flaps)</span> <span id="valeur-flaps">Cran 0</span></label>
            <input type="range" id="slider-flaps" min="0" max="3" value="0" step="1" 
                   oninput="envoyerSlider('FLAPS', this.value)">
        </div>
    </div>

    
    <div id="attitude"></div>

    
    

    <script src="/socket.io/socket.io.js"></script>
    <script>

        const socket = io();
        const tabGauges = {};

        // Fonction de création de Gauges
        function creerGauge(idElement, titre, max, unites) {
            tabGauges[idElement] = new RadialGauge({
                renderTo: idElement,
                width: 200,
                height: 200,
                units: unites,
                title: titre,
                minValue: 0,
                maxValue: max,
                majorTicks: ["0", (max/4).toString(), (max/2).toString(), (max*3/4).toString(), max.toString()],
                minorTicks: 2,
                highlights: [{ from: max*0.8, to: max, color: 'rgba(255,0,0,.3)' }],
                colorPlate: "#222",
                colorNumbers: "#eee",
                needleType: "arrow",
                animatedValue: true,
                animationDuration: 500
            }).draw();
        }

        // Initialisation des Gauges (L'ID doit correspondre au Canvas)
        creerGauge('gauge-vitesse', 'Vitesse', 300, 'kts');
        creerGauge('gauge-regime', 'RPM', 100, '%');
        creerGauge('gauge-carburant', 'Fuel', 100, '%');
       


        socket.on('donneesInstruments', (donnees) => {
            // On parcourt chaque clé du message reçu (altitude, vitesse, etc.)
            Object.keys(donnees).forEach(cle => {
                const element = document.getElementById(cle);

                // Si un élément HTML avec cet ID existe, on le met à jour
                if (element) {
                    element.innerText = donnees[cle];
                }
                if(tabGauges[`gauge-${cle}`]){
                    tabGauges[`gauge-${cle}`].value = donnees[cle];
                }
            });
        });
        // Fonction appelée à chaque fois qu'on bouge un slider
        function envoyerSlider(commandePilote, valeurCurseur) {
            // 1. Mettre à jour l'affichage sur la page web pour l'utilisateur
            if(commandePilote === 'THROTTLE') document.getElementById('valeur-throttle').innerText = valeurCurseur + '%';
            if(commandePilote === 'TRIM') document.getElementById('valeur-trim').innerText = valeurCurseur;
            if(commandePilote === 'FLAPS') document.getElementById('valeur-flaps').innerText = 'Cran ' + valeurCurseur;

            // 2. Envoyer l'information au serveur Node.js
            socket.emit('actionPilote', { 
                commande: commandePilote, 
                valeur: parseInt(valeurCurseur) 
            });
        }

        // declares the placeholder
        const attitudeElement = document.querySelector("#attitude")

        // creates an FlightIndicators' object
        const attitude = new FlightIndicators(
            attitudeElement,
            FlightIndicators.TYPE_ATTITUDE
        )
        attitude.showBox();

    </script>
</body>
</html>
